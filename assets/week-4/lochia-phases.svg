<svg xmlns="http://www.w3.org/2000/svg" width="600" height="210" viewBox="0 0 600 210" font-family="system-ui, -apple-system, sans-serif">
  <rect width="600" height="210" fill="#ffffff" rx="12"/>

  <text x="300" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#1a1a1a">Lochia — Postpartum Discharge Phases</text>

  <!-- Phase bars -->
  <rect x="40"  y="55" width="90"  height="45" rx="4 0 0 4" fill="#dc2626"/>
  <rect x="130" y="55" width="130" height="45" rx="0"       fill="#7f1d1d"/>
  <rect x="260" y="55" width="80"  height="45" rx="0"       fill="#db7093"/>
  <rect x="340" y="55" width="220" height="45" rx="0 4 4 0" fill="#fef3c7"/>

  <!-- Phase labels inside bars -->
  <text x="85"  y="83" text-anchor="middle" font-size="11" fill="#ffffff" font-weight="700">Days 1–4</text>
  <text x="195" y="83" text-anchor="middle" font-size="11" fill="#ffffff" font-weight="700">Days 4–10</text>
  <text x="300" y="83" text-anchor="middle" font-size="11" fill="#ffffff" font-weight="700">Days 10–14</text>
  <text x="450" y="83" text-anchor="middle" font-size="11" fill="#92400e" font-weight="700">Weeks 2–6</text>

  <!-- Colour descriptions -->
  <text x="85"  y="122" text-anchor="middle" font-size="12" fill="#dc2626" font-weight="600">Bright red</text>
  <text x="195" y="122" text-anchor="middle" font-size="12" fill="#7f1d1d" font-weight="600">Dark red / brown</text>
  <text x="300" y="122" text-anchor="middle" font-size="12" fill="#be185d" font-weight="600">Pink / brown</text>
  <text x="450" y="122" text-anchor="middle" font-size="12" fill="#92400e" font-weight="600">Yellow-white</text>

  <!-- Warning -->
  <rect x="40" y="140" width="520" height="34" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="300" y="162" text-anchor="middle" font-size="12" fill="#b91c1c" font-weight="600">⚠  Bright red after it has faded, heavy flow, or foul smell → call the doctor</text>

  <!-- Analogy -->
  <text x="300" y="198" text-anchor="middle" font-size="11" fill="#6b7280" font-style="italic">Like a wound draining itself — the colour tells you where in healing you are.</text>
</svg>
