<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" font-family="Arial,sans-serif">
  <rect width="560" height="360" fill="#FFFFFF" rx="12"/>

  <!-- Title -->
  <text x="280" y="32" text-anchor="middle" font-size="19" font-weight="bold" fill="#1A1A2E">Baby Blues vs. Postpartum Depression</text>
  <text x="280" y="51" text-anchor="middle" font-size="12" fill="#666">Both are common — they differ in length and severity</text>

  <!-- Axis -->
  <line x1="160" y1="290" x2="520" y2="290" stroke="#CCC" stroke-width="2"/>
  <text x="190" y="307" font-size="10" fill="#888">Day 3</text>
  <text x="330" y="307" font-size="10" fill="#888">2 weeks</text>
  <text x="480" y="307" font-size="10" fill="#888">Up to 1 year</text>

  <!-- Baby blues bar -->
  <text x="40" y="125" font-size="13" font-weight="bold" fill="#2D6A9F">Baby</text>
  <text x="40" y="140" font-size="13" font-weight="bold" fill="#2D6A9F">blues</text>
  <rect x="190" y="110" width="140" height="36" rx="8" fill="#A9CCEB"/>
  <text x="260" y="133" text-anchor="middle" font-size="11" fill="#1A1A2E">Mild, fades on its own</text>

  <!-- PPD bar -->
  <text x="40" y="215" font-size="13" font-weight="bold" fill="#C0392B">Postpartum</text>
  <text x="40" y="230" font-size="13" font-weight="bold" fill="#C0392B">depression</text>
  <rect x="190" y="200" width="330" height="36" rx="8" fill="#F0A8A0"/>
  <text x="355" y="223" text-anchor="middle" font-size="11" fill="#1A1A2E">More intense, doesn't lift — needs care</text>

  <!-- Connector lines down to axis -->
  <line x1="190" y1="146" x2="190" y2="290" stroke="#A9CCEB" stroke-width="1.5" stroke-dasharray="3,3"/>
  <line x1="330" y1="146" x2="330" y2="290" stroke="#A9CCEB" stroke-width="1.5" stroke-dasharray="3,3"/>
  <line x1="190" y1="236" x2="190" y2="290" stroke="#F0A8A0" stroke-width="1.5" stroke-dasharray="3,3"/>

  <!-- Side note box -->
  <rect x="20" y="60" width="520" height="40" rx="8" fill="#FFF7E0" stroke="#E8C468" stroke-width="1.2"/>
  <text x="280" y="78" text-anchor="middle" font-size="11" font-weight="bold" fill="#8A6300">Onset for postpartum depression is usually 1–3 weeks after birth,</text>
  <text x="280" y="92" text-anchor="middle" font-size="11" fill="#8A6300">but it can appear any time in the first year.</text>

  <!-- Warning box -->
  <rect x="20" y="250" width="150" height="80" rx="8" fill="#FBEAEA" stroke="#C0392B" stroke-width="1.3" opacity="0"/>

  <!-- Call doctor box -->
  <rect x="20" y="245" width="520" height="48" rx="8" fill="#FBEAEA" stroke="#C0392B" stroke-width="1.5" transform="translate(0,0)" opacity="0"/>

  <!-- Bottom message -->
  <rect x="20" y="245" width="520" height="50" rx="8" fill="#FBEAEA" stroke="#C0392B" stroke-width="1.5" y2="0"/>
  <text x="280" y="263" text-anchor="middle" font-size="12" font-weight="bold" fill="#B0241C">Call the doctor right away if Rian feels she might harm herself or the baby —</text>
  <text x="280" y="280" text-anchor="middle" font-size="11" fill="#333">these feelings need urgent help, not embarrassment.</text>

  <!-- Analogy -->
  <rect x="20" y="320" width="520" height="30" rx="7" fill="#EEF4FB" stroke="#B8D4F0" stroke-width="1"/>
  <text x="280" y="339" text-anchor="middle" font-size="11" fill="#333">💡 Baby blues is a rain shower — it passes. PPD is a storm that lingers and needs help to clear.</text>
</svg>
