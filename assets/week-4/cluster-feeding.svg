<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" font-family="Arial,sans-serif">
  <rect width="560" height="360" fill="#FFFFFF" rx="12"/>

  <!-- Title -->
  <text x="280" y="32" text-anchor="middle" font-size="19" font-weight="bold" fill="#1A1A2E">Cluster Feeding: Why Baby Feeds in Bursts</text>
  <text x="280" y="51" text-anchor="middle" font-size="12" fill="#666">Several short feeds, close together — most common in the evening</text>

  <!-- Stomach size growth row -->
  <text x="280" y="80" text-anchor="middle" font-size="12" font-weight="bold" fill="#555">Baby's stomach capacity grows fast</text>

  <text x="100" y="105" text-anchor="middle" font-size="11" fill="#666">Day 1</text>
  <circle cx="100" cy="135" r="10" fill="#FFD8A8" stroke="#D4A060" stroke-width="1.5"/>
  <text x="100" y="160" text-anchor="middle" font-size="10" fill="#888">~5–7 mL</text>

  <text x="280" y="105" text-anchor="middle" font-size="11" fill="#666">Day 3</text>
  <circle cx="280" cy="133" r="16" fill="#FFD8A8" stroke="#D4A060" stroke-width="1.5"/>
  <text x="280" y="160" text-anchor="middle" font-size="10" fill="#888">~22–30 mL (~1 oz)</text>

  <text x="460" y="105" text-anchor="middle" font-size="11" fill="#666">Day 7–9 (now)</text>
  <circle cx="460" cy="130" r="22" fill="#FFD8A8" stroke="#D4A060" stroke-width="1.5"/>
  <text x="460" y="162" text-anchor="middle" font-size="10" fill="#888">~30–60 mL (1–2 oz)</text>

  <!-- Arrows -->
  <line x1="120" y1="135" x2="258" y2="133" stroke="#D4A060" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="300" y1="133" x2="432" y2="130" stroke="#D4A060" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Evening clock cluster -->
  <text x="280" y="200" text-anchor="middle" font-size="12" font-weight="bold" fill="#555">A typical evening: feeds bunch up close together</text>

  <line x1="60" y1="230" x2="500" y2="230" stroke="#CCC" stroke-width="2"/>
  <text x="60" y="248" text-anchor="middle" font-size="10" fill="#888">5pm</text>
  <text x="500" y="248" text-anchor="middle" font-size="10" fill="#888">10pm</text>

  <!-- spaced feed marker earlier in day reference -->
  <circle cx="90" cy="230" r="7" fill="#2D6A9F"/>
  <circle cx="260" cy="230" r="7" fill="#2D6A9F"/>
  <circle cx="300" cy="230" r="7" fill="#2D6A9F"/>
  <circle cx="335" cy="230" r="7" fill="#2D6A9F"/>
  <circle cx="365" cy="230" r="7" fill="#2D6A9F"/>
  <circle cx="460" cy="230" r="7" fill="#2D6A9F"/>
  <text x="300" y="218" text-anchor="middle" font-size="10" fill="#2D6A9F" font-weight="bold">cluster</text>

  <!-- Info box -->
  <rect x="20" y="268" width="520" height="50" rx="8" fill="#E8F4E8" stroke="#7BC67B" stroke-width="1.5"/>
  <text x="280" y="286" text-anchor="middle" font-size="11" font-weight="bold" fill="#2E7D32">Normal cluster feeding vs. a feeding problem:</text>
  <text x="280" y="303" text-anchor="middle" font-size="11" fill="#333">Normal = settles after, wets 6+ diapers/day, gaining weight. Flag to the doctor if baby seems unsatisfied for days and isn't gaining.</text>

  <!-- Analogy -->
  <rect x="20" y="324" width="520" height="28" rx="7" fill="#EEF4FB" stroke="#B8D4F0" stroke-width="1"/>
  <text x="280" y="343" text-anchor="middle" font-size="11" fill="#333">💡 Like topping up a tiny gas tank often — baby refuels in short bursts before a growth spurt or long nap.</text>
</svg>
