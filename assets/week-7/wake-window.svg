<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 320" width="700" height="320" font-family="Georgia, serif">
  <!-- Background -->
  <rect width="700" height="320" fill="#f7f4f9" rx="14"/>

  <!-- Title -->
  <text x="350" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c2c2c">Wake Window — Baby's Awake Time Tank</text>
  <text x="350" y="56" text-anchor="middle" font-size="12" fill="#666">At 4 weeks, baby can only handle 1–2 hours awake before needing sleep again</text>

  <!-- ── TIMELINE STRIP ── -->
  <!-- 8 hour block shown: labels every 2h -->
  <!-- Background bar -->
  <rect x="40" y="90" width="620" height="60" rx="8" fill="#e8e0f0" stroke="#9c7bce" stroke-width="1.5"/>

  <!-- SLEEP block 1: 0–3h -->
  <rect x="40" y="90" width="232" height="60" rx="8" fill="#b39ddb" stroke="#7e57c2" stroke-width="1.2"/>
  <text x="156" y="117" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">😴 SLEEP</text>
  <text x="156" y="134" text-anchor="middle" font-size="11" fill="#ede7f6">~2–3 hours</text>

  <!-- AWAKE block: 3–4.5h -->
  <rect x="272" y="90" width="116" height="60" rx="0" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
  <text x="330" y="117" text-anchor="middle" font-size="13" font-weight="bold" fill="#f57f17">👀 AWAKE</text>
  <text x="330" y="134" text-anchor="middle" font-size="10" fill="#b28704">1–2 hours</text>

  <!-- SLEEP block 2: 4.5–7.5h -->
  <rect x="388" y="90" width="232" height="60" rx="8" fill="#b39ddb" stroke="#7e57c2" stroke-width="1.2"/>
  <text x="504" y="117" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">😴 SLEEP</text>
  <text x="504" y="134" text-anchor="middle" font-size="11" fill="#ede7f6">~2–3 hours</text>

  <!-- Hour markers below bar -->
  <line x1="40" y1="156" x2="40" y2="166" stroke="#888" stroke-width="1"/>
  <text x="40" y="178" text-anchor="middle" font-size="10" fill="#888">0 h</text>

  <line x1="156" y1="156" x2="156" y2="166" stroke="#888" stroke-width="1"/>
  <text x="156" y="178" text-anchor="middle" font-size="10" fill="#888">1.5 h</text>

  <line x1="272" y1="156" x2="272" y2="166" stroke="#888" stroke-width="1"/>
  <text x="272" y="178" text-anchor="middle" font-size="10" fill="#888">3 h</text>

  <line x1="330" y1="156" x2="330" y2="166" stroke="#f9a825" stroke-width="1.5"/>

  <line x1="388" y1="156" x2="388" y2="166" stroke="#888" stroke-width="1"/>
  <text x="388" y="178" text-anchor="middle" font-size="10" fill="#888">4.5 h</text>

  <line x1="504" y1="156" x2="504" y2="166" stroke="#888" stroke-width="1"/>
  <text x="504" y="178" text-anchor="middle" font-size="10" fill="#888">6 h</text>

  <line x1="620" y1="156" x2="620" y2="166" stroke="#888" stroke-width="1"/>
  <text x="620" y="178" text-anchor="middle" font-size="10" fill="#888">7.5 h</text>

  <!-- ── TANK ANALOGY ── -->
  <!-- Tank outline -->
  <rect x="40" y="200" width="80" height="90" rx="6" fill="#fff" stroke="#9c7bce" stroke-width="2"/>
  <!-- Full tank fill -->
  <rect x="40" y="200" width="80" height="90" rx="6" fill="#b39ddb" opacity="0.3"/>
  <rect x="42" y="202" width="76" height="86" rx="5" fill="#b39ddb"/>
  <text x="80" y="252" text-anchor="middle" font-size="11" fill="#fff" font-weight="bold">FULL</text>
  <text x="80" y="266" text-anchor="middle" font-size="10" fill="#ede7f6">after sleep</text>
  <!-- Arrow -->
  <text x="140" y="248" text-anchor="middle" font-size="24" fill="#9c7bce">→</text>

  <!-- Half tank -->
  <rect x="170" y="200" width="80" height="90" rx="6" fill="#fff" stroke="#f9a825" stroke-width="2"/>
  <rect x="172" y="245" width="76" height="43" rx="5" fill="#fff9c4"/>
  <line x1="170" y1="245" x2="250" y2="245" stroke="#f9a825" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="210" y="270" text-anchor="middle" font-size="11" fill="#c07a00" font-weight="bold">HALF</text>
  <text x="210" y="283" text-anchor="middle" font-size="10" fill="#b28704">1 hr awake</text>
  <!-- Arrow -->
  <text x="270" y="248" text-anchor="middle" font-size="24" fill="#9c7bce">→</text>

  <!-- Empty tank — tired cues -->
  <rect x="300" y="200" width="80" height="90" rx="6" fill="#fff" stroke="#ef5350" stroke-width="2"/>
  <rect x="302" y="275" width="76" height="13" rx="5" fill="#ffcdd2"/>
  <text x="340" y="248" text-anchor="middle" font-size="22">😫</text>
  <text x="340" y="270" text-anchor="middle" font-size="11" fill="#c62828" font-weight="bold">EMPTY</text>
  <text x="340" y="283" text-anchor="middle" font-size="10" fill="#ef5350">overtired</text>

  <!-- Sleep cue box -->
  <rect x="410" y="197" width="250" height="95" rx="8" fill="#fff" stroke="#ef5350" stroke-width="1.5"/>
  <text x="535" y="218" text-anchor="middle" font-size="12" font-weight="bold" fill="#c62828">Sleep cues to watch for:</text>
  <text x="422" y="238" font-size="11" fill="#444">•  Rubbing eyes</text>
  <text x="422" y="255" font-size="11" fill="#444">•  Drooping eyelids</text>
  <text x="422" y="272" font-size="11" fill="#444">•  Turning head away</text>
  <text x="422" y="289" font-size="11" fill="#c62828">→ Put down drowsy but awake</text>

  <!-- Footer -->
  <text x="350" y="308" text-anchor="middle" font-size="10" fill="#999">Source: Mayo Clinic — mayoclinic.org/healthy-lifestyle/infant-and-toddler-health/in-depth/baby-sleep/art-20045014</text>
</svg>
