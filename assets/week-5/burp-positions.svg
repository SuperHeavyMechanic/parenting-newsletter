<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 310" width="580" height="310" font-family="Georgia, serif">
  <!-- Background -->
  <rect width="580" height="310" fill="#fafaf8" rx="12"/>

  <!-- Title -->
  <text x="290" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#2d2d2d">3 Ways to Burp Your Baby</text>

  <!-- === Position 1: Over the shoulder === -->
  <text x="97" y="62" text-anchor="middle" font-size="13" font-weight="bold" fill="#4a7fb0">1. Over Shoulder</text>
  <!-- Parent torso -->
  <rect x="75" y="110" width="30" height="70" rx="8" fill="#a0b8d0"/>
  <!-- Parent head -->
  <circle cx="90" cy="98" r="16" fill="#c8a87a"/>
  <!-- Parent arm up -->
  <line x1="90" y1="120" x2="110" y2="90" stroke="#a0b8d0" stroke-width="10" stroke-linecap="round"/>
  <!-- Baby on shoulder -->
  <circle cx="118" cy="76" r="12" fill="#f0c88a"/>
  <rect x="110" y="88" width="16" height="30" rx="6" fill="#f8ddb0"/>
  <!-- Hand patting baby back -->
  <ellipse cx="126" cy="100" rx="10" ry="7" fill="#c8a87a"/>
  <text x="97" y="185" text-anchor="middle" font-size="10" fill="#555">Hold baby upright</text>
  <text x="97" y="200" text-anchor="middle" font-size="10" fill="#555">chin on your shoulder</text>
  <text x="97" y="215" text-anchor="middle" font-size="10" fill="#555">Pat/rub back gently</text>
  <!-- Bubbles -->
  <circle cx="138" cy="68" r="4" fill="none" stroke="#a0c0e0" stroke-width="1.5"/>
  <circle cx="146" cy="58" r="3" fill="none" stroke="#a0c0e0" stroke-width="1.5"/>
  <circle cx="152" cy="50" r="2" fill="none" stroke="#a0c0e0" stroke-width="1.5"/>

  <!-- === Position 2: Sitting up === -->
  <text x="290" y="62" text-anchor="middle" font-size="13" font-weight="bold" fill="#4a7fb0">2. Sitting Up</text>
  <!-- Parent forearm/lap -->
  <rect x="248" y="155" width="70" height="22" rx="8" fill="#c8a87a"/>
  <!-- Baby sitting on hand -->
  <rect x="268" y="105" width="22" height="42" rx="8" fill="#f8ddb0"/>
  <circle cx="279" cy="94" r="13" fill="#f0c88a"/>
  <!-- Supporting hand under chin -->
  <ellipse cx="279" cy="118" rx="14" ry="8" fill="#c8a87a"/>
  <!-- Other hand patting back -->
  <ellipse cx="298" cy="120" rx="10" ry="6" fill="#c8a87a"/>
  <text x="290" y="192" text-anchor="middle" font-size="10" fill="#555">Baby sits on your lap</text>
  <text x="290" y="207" text-anchor="middle" font-size="10" fill="#555">Support chest &amp; chin</text>
  <text x="290" y="222" text-anchor="middle" font-size="10" fill="#555">with one hand</text>
  <!-- Bubbles -->
  <circle cx="292" cy="80" r="4" fill="none" stroke="#a0c0e0" stroke-width="1.5"/>
  <circle cx="300" cy="70" r="3" fill="none" stroke="#a0c0e0" stroke-width="1.5"/>
  <circle cx="306" cy="62" r="2" fill="none" stroke="#a0c0e0" stroke-width="1.5"/>

  <!-- === Position 3: Face-down on lap === -->
  <text x="480" y="62" text-anchor="middle" font-size="13" font-weight="bold" fill="#4a7fb0">3. Face-Down on Lap</text>
  <!-- Parent lap (horizontal) -->
  <rect x="420" y="155" width="120" height="22" rx="8" fill="#c8a87a"/>
  <!-- Baby lying face-down on lap -->
  <rect x="435" y="125" width="90" height="28" rx="10" fill="#f8ddb0"/>
  <!-- Baby head turned to side -->
  <circle cx="435" cy="132" r="14" fill="#f0c88a"/>
  <!-- Supporting hand under belly -->
  <ellipse cx="480" cy="145" rx="20" ry="9" fill="#d0b088"/>
  <!-- Patting hand on back -->
  <ellipse cx="510" cy="128" rx="12" ry="7" fill="#c8a87a"/>
  <text x="480" y="192" text-anchor="middle" font-size="10" fill="#555">Baby lies face-down</text>
  <text x="480" y="207" text-anchor="middle" font-size="10" fill="#555">across your knees</text>
  <text x="480" y="222" text-anchor="middle" font-size="10" fill="#555">Support head, pat back</text>
  <!-- Bubbles -->
  <circle cx="430" cy="116" r="4" fill="none" stroke="#a0c0e0" stroke-width="1.5"/>
  <circle cx="422" cy="106" r="3" fill="none" stroke="#a0c0e0" stroke-width="1.5"/>
  <circle cx="416" cy="98" r="2" fill="none" stroke="#a0c0e0" stroke-width="1.5"/>

  <!-- Dividers -->
  <line x1="192" y1="58" x2="192" y2="240" stroke="#e0e0d8" stroke-width="1.5"/>
  <line x1="385" y1="58" x2="385" y2="240" stroke="#e0e0d8" stroke-width="1.5"/>

  <!-- Tips strip -->
  <rect x="30" y="248" width="520" height="50" rx="6" fill="#e8f4e8" stroke="#80b880" stroke-width="1"/>
  <text x="290" y="266" text-anchor="middle" font-size="11" font-weight="bold" fill="#2a6a2a">Tips for every position</text>
  <text x="290" y="282" text-anchor="middle" font-size="10.5" fill="#3a7a3a">Pat or rub gently from bottom to top · Keep upright 20–30 min after feeding · Burp mid-feed too</text>
  <text x="290" y="296" text-anchor="middle" font-size="10.5" fill="#555" font-style="italic">Analogy: like tipping a bottle to release trapped air — gravity + gentle pressure does the work</text>
</svg>
