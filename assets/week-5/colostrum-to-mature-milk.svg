<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 280" width="580" height="280" font-family="Georgia, serif">
  <!-- Background -->
  <rect width="580" height="280" fill="#fafaf8" rx="12"/>

  <!-- Title -->
  <text x="290" y="34" text-anchor="middle" font-size="17" font-weight="bold" fill="#2d2d2d">Breast Milk Changes in the First Week</text>

  <!-- Timeline arrow base -->
  <line x1="60" y1="130" x2="510" y2="130" stroke="#c9c3b8" stroke-width="4"/>
  <polygon points="510,122 524,130 510,138" fill="#c9c3b8"/>

  <!-- Stage 1: Colostrum -->
  <!-- Circle marker -->
  <circle cx="120" cy="130" r="10" fill="#e8a020"/>
  <!-- Drop shape (yellow) -->
  <ellipse cx="120" cy="75" rx="22" ry="18" fill="#f0c040"/>
  <path d="M106,75 Q120,50 134,75" fill="#f0c040"/>
  <text x="120" y="172" text-anchor="middle" font-size="14" font-weight="bold" fill="#b07000">Colostrum</text>
  <text x="120" y="190" text-anchor="middle" font-size="11" fill="#6b6b6b">Days 1–3</text>
  <text x="120" y="208" text-anchor="middle" font-size="10" fill="#6b6b6b">Thick · Golden</text>
  <text x="120" y="222" text-anchor="middle" font-size="10" fill="#6b6b6b">Small amounts</text>
  <text x="120" y="238" text-anchor="middle" font-size="10" fill="#6b6b6b">Packed with antibodies</text>

  <!-- Stage 2: Transitional milk -->
  <circle cx="305" cy="130" r="10" fill="#c0a060"/>
  <!-- Larger drop (creamy) -->
  <ellipse cx="305" cy="68" rx="30" ry="22" fill="#e8d090"/>
  <path d="M285,68 Q305,40 325,68" fill="#e8d090"/>
  <text x="305" y="172" text-anchor="middle" font-size="14" font-weight="bold" fill="#8a6a20">Transitional</text>
  <text x="305" y="190" text-anchor="middle" font-size="11" fill="#6b6b6b">Days 3–14</text>
  <text x="305" y="208" text-anchor="middle" font-size="10" fill="#6b6b6b">Creamy · More volume</text>
  <text x="305" y="222" text-anchor="middle" font-size="10" fill="#6b6b6b">Mix of colostrum</text>
  <text x="305" y="238" text-anchor="middle" font-size="10" fill="#6b6b6b">&amp; mature milk</text>

  <!-- Stage 3: Mature milk -->
  <circle cx="480" cy="130" r="10" fill="#6090c0"/>
  <!-- Largest drop (white/blue) -->
  <ellipse cx="480" cy="60" rx="38" ry="28" fill="#d0e8f8"/>
  <path d="M454,60 Q480,28 506,60" fill="#d0e8f8"/>
  <text x="480" y="172" text-anchor="middle" font-size="14" font-weight="bold" fill="#3060a0">Mature Milk</text>
  <text x="480" y="190" text-anchor="middle" font-size="11" fill="#6b6b6b">Day 14 onward</text>
  <text x="480" y="208" text-anchor="middle" font-size="10" fill="#6b6b6b">White/bluish · Plentiful</text>
  <text x="480" y="222" text-anchor="middle" font-size="10" fill="#6b6b6b">Full nutrition</text>
  <text x="480" y="238" text-anchor="middle" font-size="10" fill="#6b6b6b">Supply matches demand</text>

  <!-- Analogy -->
  <rect x="40" y="254" width="500" height="20" rx="4" fill="#f0ece4"/>
  <text x="290" y="268" text-anchor="middle" font-size="11" fill="#555">Analogy: like a concentrated energy shot that gradually becomes a full glass of milk</text>
</svg>
