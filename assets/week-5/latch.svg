<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 380" font-family="Arial,sans-serif">
  <rect width="560" height="380" fill="#FFFFFF" rx="12"/>
  <text x="280" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1A1A2E">Good Latch vs. Shallow Latch</text>
  <text x="280" y="50" text-anchor="middle" font-size="12" fill="#666">A deep latch = less pain + more milk. A shallow latch = sore nipples + less flow.</text>

  <!-- LEFT: Good Latch -->
  <text x="130" y="75" text-anchor="middle" font-size="13" font-weight="bold" fill="#2E7D32">✓ Good (Deep) Latch</text>
  <ellipse cx="115" cy="155" rx="68" ry="63" fill="#FFE0CC" stroke="#D4A060" stroke-width="1.5"/>
  <ellipse cx="168" cy="155" rx="26" ry="20" fill="#D4836A" opacity="0.6"/>
  <circle cx="187" cy="155" r="7" fill="#B05535"/>
  <!-- Baby mouth covering most of areola -->
  <path d="M192 143 Q225 120 258 138 L255 155 Q225 148 192 165 Z" fill="#C47A5A" opacity="0.8"/>
  <ellipse cx="258" cy="148" rx="32" ry="26" fill="#FDDBB4" stroke="#C4956A" stroke-width="1.5"/>
  <!-- Annotations -->
  <text x="130" y="218" text-anchor="middle" font-size="10" fill="#2E7D32" font-weight="bold">✓ Wide open mouth</text>
  <text x="130" y="233" text-anchor="middle" font-size="10" fill="#2E7D32" font-weight="bold">✓ Lips flanged out</text>
  <text x="130" y="248" text-anchor="middle" font-size="10" fill="#2E7D32" font-weight="bold">✓ Chin touches breast</text>
  <text x="130" y="263" text-anchor="middle" font-size="10" fill="#2E7D32" font-weight="bold">✓ Most areola inside</text>

  <!-- Divider -->
  <line x1="285" y1="65" x2="285" y2="295" stroke="#DDD" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- RIGHT: Shallow Latch -->
  <text x="420" y="75" text-anchor="middle" font-size="13" font-weight="bold" fill="#C62828">✗ Shallow Latch</text>
  <ellipse cx="405" cy="155" rx="68" ry="63" fill="#FFE0CC" stroke="#D4A060" stroke-width="1.5"/>
  <ellipse cx="458" cy="155" rx="26" ry="20" fill="#D4836A" opacity="0.6"/>
  <circle cx="477" cy="155" r="7" fill="#B05535"/>
  <!-- Baby mouth only on nipple -->
  <path d="M479 148 Q494 142 508 147 L507 162 Q494 167 479 161 Z" fill="#C47A5A" opacity="0.8"/>
  <ellipse cx="520" cy="155" rx="18" ry="15" fill="#FDDBB4" stroke="#C4956A" stroke-width="1.5"/>
  <!-- Annotations -->
  <text x="420" y="218" text-anchor="middle" font-size="10" fill="#C62828" font-weight="bold">✗ Only nipple = pain</text>
  <text x="420" y="233" text-anchor="middle" font-size="10" fill="#C62828" font-weight="bold">✗ Lips tucked in</text>
  <text x="420" y="248" text-anchor="middle" font-size="10" fill="#C62828" font-weight="bold">✗ Chin doesn't touch</text>
  <text x="420" y="263" text-anchor="middle" font-size="10" fill="#C62828" font-weight="bold">✗ Less milk transfer</text>

  <!-- How-to steps -->
  <rect x="20" y="285" width="520" height="56" rx="8" fill="#E8F4E8" stroke="#7BC67B" stroke-width="1.5"/>
  <text x="280" y="303" text-anchor="middle" font-size="11" font-weight="bold" fill="#1B5E20">Getting a good latch — 4 steps:</text>
  <text x="280" y="320" text-anchor="middle" font-size="11" fill="#333">1. Aim nipple toward baby's NOSE (not mouth)  2. Wait for wide-open "yawn" mouth</text>
  <text x="280" y="335" text-anchor="middle" font-size="11" fill="#333">3. Bring baby TO breast — don't lean forward  4. Chin + lower lip touch first</text>

  <!-- Analogy -->
  <rect x="20" y="347" width="520" height="26" rx="7" fill="#EEF4FB" stroke="#B8D4F0" stroke-width="1"/>
  <text x="280" y="365" text-anchor="middle" font-size="11" fill="#333">💡 Like biting a big burger — you open wide and tilt, you don't just nibble the tip.</text>
</svg>
