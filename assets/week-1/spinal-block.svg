<svg width="680" height="380" viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, Arial, sans-serif">
  <!-- Background -->
  <rect width="680" height="380" fill="#FAFAF7" rx="14"/>

  <!-- Title -->
  <text x="340" y="36" text-anchor="middle" font-size="17" font-weight="700" fill="#1A1A1A">Spinal Block (Spinal Anesthesia)</text>
  <text x="340" y="56" text-anchor="middle" font-size="12.5" fill="#555">Like switching off the sound on the lower half — she stays fully awake</text>

  <!-- === BODY SILHOUETTE (side view) === -->
  <!-- Full body outline -->
  <ellipse cx="155" cy="120" rx="38" ry="40" fill="#F5D9C8" stroke="#C8956C" stroke-width="2"/>
  <!-- torso -->
  <rect x="125" y="155" width="60" height="110" rx="10" fill="#F5D9C8" stroke="#C8956C" stroke-width="2"/>
  <!-- legs -->
  <rect x="125" y="258" width="25" height="80" rx="8" fill="#F5D9C8" stroke="#C8956C" stroke-width="2"/>
  <rect x="155" y="258" width="25" height="80" rx="8" fill="#F5D9C8" stroke="#C8956C" stroke-width="2"/>

  <!-- NUMB ZONE overlay (below waist) -->
  <rect x="125" y="220" width="60" height="50" rx="0" fill="#B3D9F7" opacity="0.55"/>
  <rect x="125" y="258" width="60" height="80" rx="0" fill="#B3D9F7" opacity="0.55"/>
  <rect x="125" y="330" width="55" height="8" rx="8" fill="#B3D9F7" opacity="0.55"/>

  <!-- Dashed boundary line at waist -->
  <line x1="110" y1="222" x2="200" y2="222" stroke="#4A90D9" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- AWAKE label -->
  <text x="155" y="195" text-anchor="middle" font-size="11" font-weight="600" fill="#388E3C">Awake &amp; aware</text>

  <!-- NUMB label -->
  <text x="155" y="290" text-anchor="middle" font-size="11" font-weight="600" fill="#1565C0">Numb</text>

  <!-- === SPINE CLOSE-UP === -->
  <!-- Divider -->
  <line x1="235" y1="70" x2="235" y2="350" stroke="#DDD" stroke-width="1.5" stroke-dasharray="5,4"/>

  <text x="440" y="85" text-anchor="middle" font-size="13" font-weight="600" fill="#333">Close-up: lower spine</text>

  <!-- Vertebrae stack (5) -->
  <rect x="370" y="100" width="50" height="26" rx="5" fill="#D4B896" stroke="#A0845C" stroke-width="1.5"/>
  <rect x="370" y="133" width="50" height="26" rx="5" fill="#D4B896" stroke="#A0845C" stroke-width="1.5"/>
  <rect x="370" y="166" width="50" height="26" rx="5" fill="#D4B896" stroke="#A0845C" stroke-width="1.5"/>
  <rect x="370" y="199" width="50" height="26" rx="5" fill="#D4B896" stroke="#A0845C" stroke-width="1.5"/>
  <rect x="370" y="232" width="50" height="26" rx="5" fill="#D4B896" stroke="#A0845C" stroke-width="1.5"/>

  <!-- Spinal canal -->
  <rect x="422" y="98" width="18" height="164" rx="4" fill="#EFE0D0" stroke="#A0845C" stroke-width="1.2"/>

  <!-- Numb zone in canal (below injection point) -->
  <rect x="423" y="170" width="16" height="92" rx="2" fill="#B3D9F7" opacity="0.85"/>

  <!-- Injection point marker -->
  <circle cx="431" cy="170" r="5" fill="#4A90D9"/>

  <!-- Needle -->
  <line x1="560" y1="145" x2="445" y2="168" stroke="#4A90D9" stroke-width="2.5"/>
  <!-- Arrowhead -->
  <polygon points="445,168 454,162 455,173" fill="#4A90D9"/>
  <!-- Syringe body -->
  <rect x="555" y="136" width="44" height="18" rx="5" fill="#4A90D9"/>
  <rect x="597" y="139" width="14" height="12" rx="2" fill="#2176AE"/>

  <!-- Labels -->
  <text x="348" y="147" text-anchor="end" font-size="11" fill="#795548">vertebra</text>
  <line x1="350" y1="144" x2="368" y2="144" stroke="#795548" stroke-width="1.2"/>

  <text x="348" y="210" text-anchor="end" font-size="11" fill="#795548">spinal</text>
  <text x="348" y="223" text-anchor="end" font-size="11" fill="#795548">canal</text>
  <line x1="350" y1="210" x2="420" y2="186" stroke="#795548" stroke-width="1.2"/>

  <text x="558" y="130" font-size="11" fill="#1565C0">needle</text>

  <!-- Numb zone label -->
  <line x1="442" y1="215" x2="490" y2="232" stroke="#4A90D9" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="492" y="236" font-size="11" fill="#1565C0">numb from here</text>

  <!-- Feels-zone label -->
  <line x1="442" y1="135" x2="490" y2="118" stroke="#66BB6A" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="492" y="122" font-size="11" fill="#388E3C">feels everything</text>

  <!-- Bottom callout box -->
  <rect x="50" y="308" width="580" height="52" rx="9" fill="#E3F2FD" stroke="#90CAF9" stroke-width="1.5"/>
  <text x="340" y="330" text-anchor="middle" font-size="12.5" font-weight="600" fill="#0D47A1">What she feels during surgery: pressure and movement — not pain.</text>
  <text x="340" y="349" text-anchor="middle" font-size="11.5" fill="#1565C0">She will be alert, can talk to you, and will hear baby's first cry.</text>
</svg>
