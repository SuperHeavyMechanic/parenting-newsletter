<svg width="680" height="380" viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, Arial, sans-serif">
  <!-- Background -->
  <rect width="680" height="380" fill="#FAFAF7" rx="14"/>

  <!-- Title -->
  <text x="340" y="36" text-anchor="middle" font-size="17" font-weight="700" fill="#1A1A1A">Surgical Drape — OR Setup (Top View)</text>
  <text x="340" y="56" text-anchor="middle" font-size="12.5" fill="#555">You sit at her head the entire time — the drape separates you from the surgical site</text>

  <!-- OR room outline -->
  <rect x="40" y="72" width="600" height="260" rx="16" fill="#F0F4F8" stroke="#B0BEC5" stroke-width="2"/>

  <!-- OR label -->
  <text x="340" y="91" text-anchor="middle" font-size="11" fill="#90A4AE">Operating Room (bird's-eye view)</text>

  <!-- Operating table -->
  <rect x="180" y="115" width="320" height="170" rx="10" fill="#E8EAF6" stroke="#7986CB" stroke-width="2"/>

  <!-- Patient on table (top-down body shape) -->
  <!-- Head -->
  <ellipse cx="245" cy="145" rx="28" ry="28" fill="#F5D9C8" stroke="#C8956C" stroke-width="1.8"/>
  <!-- Torso -->
  <rect x="218" y="170" width="55" height="100" rx="12" fill="#F5D9C8" stroke="#C8956C" stroke-width="1.8"/>
  <!-- Legs -->
  <rect x="218" y="265" width="22" height="18" rx="5" fill="#F5D9C8" stroke="#C8956C" stroke-width="1.8"/>
  <rect x="247" y="265" width="22" height="18" rx="5" fill="#F5D9C8" stroke="#C8956C" stroke-width="1.8"/>

  <!-- "Wife" label -->
  <text x="245" y="145" text-anchor="middle" dominant-baseline="middle" font-size="10" font-weight="600" fill="#5D4037">wife</text>

  <!-- === SURGICAL DRAPE === -->
  <rect x="268" y="108" width="10" height="186" rx="0" fill="#42A5F5" opacity="0.85"/>
  <!-- Drape label -->
  <text x="278" y="104" font-size="11" font-weight="700" fill="#1565C0">DRAPE</text>

  <!-- === DAD'S SIDE (left of drape) === -->
  <!-- Chair icon -->
  <rect x="90" y="175" width="40" height="36" rx="5" fill="#C8E6C9" stroke="#4CAF50" stroke-width="2"/>
  <rect x="92" y="205" width="8" height="20" rx="3" fill="#4CAF50"/>
  <rect x="120" y="205" width="8" height="20" rx="3" fill="#4CAF50"/>
  <rect x="88" y="165" width="44" height="12" rx="4" fill="#4CAF50"/>

  <!-- Dad figure (sitting) -->
  <circle cx="110" cy="148" r="15" fill="#A5D6A7" stroke="#388E3C" stroke-width="1.5"/>
  <text x="110" y="153" text-anchor="middle" font-size="11" font-weight="700" fill="#1B5E20">DAD</text>

  <!-- Arrow pointing to wife's head -->
  <line x1="150" y1="163" x2="212" y2="148" stroke="#388E3C" stroke-width="1.8" stroke-dasharray="5,3"/>
  <polygon points="212,148 202,144 202,153" fill="#388E3C"/>

  <!-- Dad zone label -->
  <rect x="55" y="286" width="170" height="44" rx="8" fill="#E8F5E9" stroke="#A5D6A7" stroke-width="1.5"/>
  <text x="140" y="304" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1B5E20">Your zone</text>
  <text x="140" y="320" text-anchor="middle" font-size="10.5" fill="#2E7D32">head side of the drape</text>

  <!-- === SURGEON'S SIDE (right of drape) === -->
  <!-- Surgeon figure -->
  <circle cx="490" cy="200" r="18" fill="#B3E5FC" stroke="#0288D1" stroke-width="1.5"/>
  <text x="490" y="197" text-anchor="middle" font-size="10" font-weight="700" fill="#01579B">sur-</text>
  <text x="490" y="209" text-anchor="middle" font-size="10" font-weight="700" fill="#01579B">geon</text>

  <!-- Surgical site indicator -->
  <ellipse cx="340" cy="230" rx="18" ry="12" fill="none" stroke="#E57373" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="370" y="230" font-size="10" fill="#C62828">surgical</text>
  <text x="370" y="242" font-size="10" fill="#C62828">site</text>

  <!-- Surgeon zone label -->
  <rect x="440" y="286" width="185" height="44" rx="8" fill="#E3F2FD" stroke="#90CAF9" stroke-width="1.5"/>
  <text x="532" y="304" text-anchor="middle" font-size="11.5" font-weight="700" fill="#0D47A1">Surgical zone</text>
  <text x="532" y="320" text-anchor="middle" font-size="10.5" fill="#1565C0">you cannot see this side</text>

  <!-- "Can't see" note with X -->
  <line x1="282" y1="230" x2="400" y2="230" stroke="#E57373" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- Bottom callout -->
  <rect x="50" y="344" width="580" height="26" rx="7" fill="#FFF3E0" stroke="#FFCC02" stroke-width="1.2"/>
  <text x="340" y="361" text-anchor="middle" font-size="11.5" fill="#E65100" font-weight="600">Ask your OB about a "gentle C-section" — some hospitals lower or use a clear drape so you can both see baby emerge.</text>
</svg>
