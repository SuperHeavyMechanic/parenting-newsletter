<svg xmlns="http://www.w3.org/2000/svg" width="600" height="340" viewBox="0 0 600 340">
  <rect width="600" height="340" fill="#ffffff"/>

  <!-- Title -->
  <text x="300" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#222">The Let-Down Reflex</text>
  <text x="300" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666">Analogy: squeezing a wet sponge — milk was already there; let-down releases it.</text>

  <!-- Arrow definitions -->
  <defs>
    <marker id="arrowGray" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#777"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e65100"/>
    </marker>
  </defs>

  <!-- Trigger box -->
  <rect x="30" y="82" width="155" height="72" rx="10" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="108" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1565c0">Trigger</text>
  <text x="108" y="121" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333">Baby sucking</text>
  <text x="108" y="137" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333">Baby's cry or smell</text>
  <text x="108" y="153" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333">Thinking of baby</text>

  <!-- Arrow trigger to brain -->
  <line x1="185" y1="118" x2="228" y2="118" stroke="#777" stroke-width="1.8" marker-end="url(#arrowGray)"/>

  <!-- Brain oval -->
  <ellipse cx="300" cy="118" rx="62" ry="46" fill="#ffe0b2" stroke="#e65100" stroke-width="2"/>
  <text x="300" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#e65100">Brain</text>
  <text x="300" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">releases</text>
  <text x="300" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">oxytocin</text>

  <!-- Arrow brain down to breast -->
  <line x1="300" y1="165" x2="300" y2="205" stroke="#e65100" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <text x="312" y="190" font-family="Arial, sans-serif" font-size="10" fill="#e65100">oxytocin</text>

  <!-- Breast oval -->
  <ellipse cx="300" cy="255" rx="75" ry="52" fill="#fce4ec" stroke="#c62828" stroke-width="2"/>
  <text x="300" y="244" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#c62828">Breast</text>
  <text x="300" y="261" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">Milk ducts squeeze</text>
  <text x="300" y="277" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#555">→ milk flows to nipple</text>

  <!-- Stress note box -->
  <rect x="415" y="82" width="160" height="72" rx="10" fill="#fff3e0" stroke="#e65100" stroke-width="1"/>
  <text x="495" y="102" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#e65100">Why stress hurts supply</text>
  <text x="495" y="119" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">Cortisol (stress</text>
  <text x="495" y="133" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">hormone) blocks</text>
  <text x="495" y="147" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">oxytocin release</text>

  <!-- Dotted line from brain to stress box -->
  <line x1="362" y1="100" x2="413" y2="100" stroke="#e65100" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Footer note -->
  <text x="300" y="325" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#999">Dad's role: keep environment calm, bring baby to mom, reduce her mental load during feeds.</text>
</svg>
