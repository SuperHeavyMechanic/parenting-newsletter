<svg xmlns="http://www.w3.org/2000/svg" width="600" height="320" viewBox="0 0 600 320">
  <rect width="600" height="320" fill="#ffffff"/>

  <defs>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#bbb"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="300" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#222">Cluster Feeding</text>
  <text x="300" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666">Analogy: loading up on snacks before a long hike — baby is stocking up.</text>

  <!-- Timeline hour labels -->
  <text x="72"  y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#999">12pm</text>
  <text x="174" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#999">3pm</text>
  <text x="276" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#999">6pm</text>
  <text x="378" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#999">9pm</text>
  <text x="480" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#999">12am</text>

  <!-- Row 1 label -->
  <text x="36" y="107" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2e7d32">Normal</text>
  <!-- Row 1 baseline -->
  <line x1="55" y1="112" x2="545" y2="112" stroke="#eee" stroke-width="1.5"/>
  <!-- 7 evenly-spaced dots (~every 70px) -->
  <circle cx="72"  cy="112" r="9" fill="#4caf50"/>
  <circle cx="142" cy="112" r="9" fill="#4caf50"/>
  <circle cx="212" cy="112" r="9" fill="#4caf50"/>
  <circle cx="282" cy="112" r="9" fill="#4caf50"/>
  <circle cx="352" cy="112" r="9" fill="#4caf50"/>
  <circle cx="422" cy="112" r="9" fill="#4caf50"/>
  <circle cx="492" cy="112" r="9" fill="#4caf50"/>
  <text x="300" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">Even spacing · every 2–3 hrs · 8–10 feeds total in 24 hrs</text>

  <!-- Row 2 label -->
  <text x="36" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#bf360c">Cluster</text>
  <!-- Row 2 baseline -->
  <line x1="55" y1="190" x2="545" y2="190" stroke="#eee" stroke-width="1.5"/>
  <!-- Normal morning feeds -->
  <circle cx="72"  cy="190" r="9" fill="#ff7043"/>
  <circle cx="142" cy="190" r="9" fill="#ff7043"/>
  <!-- Cluster group 6–9pm zone: 276–378 on scale -->
  <circle cx="276" cy="190" r="9" fill="#ff7043"/>
  <circle cx="301" cy="190" r="9" fill="#ff7043"/>
  <circle cx="326" cy="190" r="9" fill="#ff7043"/>
  <circle cx="351" cy="190" r="9" fill="#ff7043"/>
  <circle cx="376" cy="190" r="9" fill="#ff7043"/>
  <!-- Cluster bracket -->
  <rect x="266" y="203" width="120" height="20" rx="4" fill="#fbe9e7"/>
  <text x="326" y="217" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#bf360c">every 20–40 min</text>
  <!-- Resume normal -->
  <circle cx="476" cy="190" r="9" fill="#ff7043"/>
  <text x="300" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">Cluster in the evening, then often a longer sleep stretch overnight</text>

  <!-- Brace under cluster -->
  <line x1="270" y1="225" x2="270" y2="232" stroke="#e57373" stroke-width="1"/>
  <line x1="270" y1="232" x2="390" y2="232" stroke="#e57373" stroke-width="1"/>
  <line x1="390" y1="232" x2="390" y2="225" stroke="#e57373" stroke-width="1"/>

  <!-- Tip box -->
  <rect x="40" y="262" width="520" height="42" rx="6" fill="#e8f5e9"/>
  <text x="300" y="281" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2e7d32" font-weight="bold">Dad's role during a cluster:</text>
  <text x="300" y="297" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2e7d32">Keep mom fed, watered, and comfortable. Don't offer formula — this is supply-building.</text>
</svg>
