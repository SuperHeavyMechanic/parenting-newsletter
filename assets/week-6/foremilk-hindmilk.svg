<svg xmlns="http://www.w3.org/2000/svg" width="600" height="300" viewBox="0 0 600 300">
  <rect width="600" height="300" fill="#ffffff"/>

  <defs>
    <linearGradient id="milkGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#bbdefb"/>
      <stop offset="45%" stop-color="#bbdefb"/>
      <stop offset="65%" stop-color="#fff8e1"/>
      <stop offset="100%" stop-color="#fff9c4"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="300" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#222">Foremilk vs. Hindmilk</text>
  <text x="300" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666">Analogy: like a glass of fresh milk — watery liquid on top, cream settles to the bottom.</text>

  <!-- Left card: Foremilk -->
  <rect x="40" y="68" width="200" height="100" rx="10" fill="#bbdefb" stroke="#1565c0" stroke-width="1.5"/>
  <text x="140" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0d47a1">FOREMILK</text>
  <text x="140" y="111" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#1565c0">Thin · watery · sweet</text>
  <text x="140" y="129" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333">Hydrates baby</text>
  <text x="140" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333">Released first in the feed</text>
  <text x="140" y="161" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">(like a drink of water)</text>

  <!-- Arrow -->
  <text x="260" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#aaa">→</text>

  <!-- Right card: Hindmilk -->
  <rect x="285" y="68" width="275" height="100" rx="10" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
  <text x="422" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#e65100">HINDMILK</text>
  <text x="422" y="111" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#f57f17">Rich · creamy · high-fat</text>
  <text x="422" y="129" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333">Fills baby up · supports growth</text>
  <text x="422" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#333">Released later in the feed</text>
  <text x="422" y="161" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#555">(like the main course)</text>

  <!-- Feed timeline bar -->
  <text x="40" y="195" font-family="Arial, sans-serif" font-size="10" fill="#888">Start of feed</text>
  <text x="510" y="195" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#888">End of feed</text>
  <rect x="40" y="203" width="520" height="22" rx="5" fill="url(#milkGrad)" stroke="#ccc" stroke-width="1"/>
  <text x="160" y="219" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#0d47a1">Foremilk (first ~5–7 min)</text>
  <text x="430" y="219" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e65100">Hindmilk builds as feed continues</text>

  <!-- Not a sharp switch line -->
  <line x1="295" y1="200" x2="295" y2="228" stroke="#aaa" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="295" y="245" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#999">gradual shift — not an instant switch</text>

  <!-- Tip box -->
  <rect x="40" y="260" width="520" height="28" rx="6" fill="#e8f5e9"/>
  <text x="300" y="279" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2e7d32">Dad tip: let baby fully drain one breast before switching — they need the hindmilk to feel full.</text>
</svg>
