<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 320" width="560" height="320" font-family="Georgia, serif">
  <!-- Background -->
  <rect width="560" height="320" rx="12" fill="#fff8f3"/>

  <!-- Title -->
  <text x="280" y="36" text-anchor="middle" font-size="17" font-weight="bold" fill="#7c2d12">Colic — The Rule of Threes</text>
  <text x="280" y="56" text-anchor="middle" font-size="12" fill="#9a3412">All three must be true before calling it colic</text>

  <!-- Large "3 × 3 × 3" display -->
  <!-- Box 1: 3 hours -->
  <rect x="40" y="76" width="140" height="140" rx="14" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
  <text x="110" y="130" text-anchor="middle" font-size="60" font-weight="bold" fill="#ef4444">3</text>
  <text x="110" y="156" text-anchor="middle" font-size="13" font-weight="bold" fill="#7f1d1d">hours</text>
  <text x="110" y="174" text-anchor="middle" font-size="11" fill="#7f1d1d">of crying</text>
  <text x="110" y="190" text-anchor="middle" font-size="11" fill="#7f1d1d">per day</text>
  <text x="110" y="206" text-anchor="middle" font-size="9" fill="#9a3412">(in a row or total)</text>

  <!-- × sign -->
  <text x="200" y="152" text-anchor="middle" font-size="36" fill="#b45309">×</text>

  <!-- Box 2: 3 days -->
  <rect x="210" y="76" width="140" height="140" rx="14" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="280" y="130" text-anchor="middle" font-size="60" font-weight="bold" fill="#d97706">3</text>
  <text x="280" y="156" text-anchor="middle" font-size="13" font-weight="bold" fill="#78350f">days</text>
  <text x="280" y="174" text-anchor="middle" font-size="11" fill="#78350f">a week</text>
  <text x="280" y="190" text-anchor="middle" font-size="11" fill="#78350f"> </text>
  <text x="280" y="206" text-anchor="middle" font-size="9" fill="#92400e">(most days)</text>

  <!-- × sign -->
  <text x="370" y="152" text-anchor="middle" font-size="36" fill="#b45309">×</text>

  <!-- Box 3: 3 weeks -->
  <rect x="380" y="76" width="140" height="140" rx="14" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="450" y="130" text-anchor="middle" font-size="60" font-weight="bold" fill="#16a34a">3</text>
  <text x="450" y="156" text-anchor="middle" font-size="13" font-weight="bold" fill="#14532d">weeks</text>
  <text x="450" y="174" text-anchor="middle" font-size="11" fill="#14532d">in a row</text>
  <text x="450" y="190" text-anchor="middle" font-size="11" fill="#14532d"> </text>
  <text x="450" y="206" text-anchor="middle" font-size="9" fill="#166534">(ongoing pattern)</text>

  <!-- Note box -->
  <rect x="40" y="232" width="480" height="40" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="280" y="250" text-anchor="middle" font-size="11" fill="#78350f" font-weight="bold">Important: Colic is not dangerous — it resolves on its own, usually by 3–4 months.</text>
  <text x="280" y="264" text-anchor="middle" font-size="11" fill="#78350f">Call your doctor early if baby seems to be in real pain, or if colic is new/sudden.</text>

  <!-- Analogy -->
  <rect x="40" y="284" width="480" height="24" rx="6" fill="#fde8d5"/>
  <text x="280" y="300" text-anchor="middle" font-size="11" fill="#3d2b1f">💡 Analogy: Colic is a weather forecast — predictable timing, no clear cause, always passes.</text>
</svg>
