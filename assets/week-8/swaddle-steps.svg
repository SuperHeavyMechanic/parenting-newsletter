<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" width="560" height="360" font-family="Georgia, serif">
  <!-- Background -->
  <rect width="560" height="360" rx="12" fill="#f0fdf4"/>

  <!-- Title -->
  <text x="280" y="34" text-anchor="middle" font-size="17" font-weight="bold" fill="#14532d">How to Swaddle — The Diamond Wrap</text>
  <text x="280" y="54" text-anchor="middle" font-size="12" fill="#166534">Snug enough that baby can't break free; loose enough for hips to bend</text>

  <!-- Step 1 -->
  <rect x="30" y="68" width="230" height="120" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="145" y="90" text-anchor="middle" font-size="12" font-weight="bold" fill="#14532d">Step 1 — Diamond position</text>
  <!-- Diamond blanket shape -->
  <polygon points="145,100 190,140 145,180 100,140" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.5"/>
  <!-- Fold top corner down -->
  <polygon points="145,100 165,120 125,120" fill="#86efac" stroke="#16a34a" stroke-width="1"/>
  <text x="145" y="195" text-anchor="middle" font-size="10" fill="#14532d">Lay blanket in a diamond.</text>
  <text x="145" y="208" text-anchor="middle" font-size="10" fill="#14532d">Fold top corner down ~15 cm.</text>

  <!-- Step 2 -->
  <rect x="300" y="68" width="230" height="120" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="415" y="90" text-anchor="middle" font-size="12" font-weight="bold" fill="#14532d">Step 2 — Place baby</text>
  <!-- Baby outline schematic -->
  <ellipse cx="415" cy="128" rx="22" ry="18" fill="#fde68a" stroke="#d97706" stroke-width="1.5"/>
  <!-- Body -->
  <rect x="403" y="144" width="24" height="40" rx="8" fill="#fde68a" stroke="#d97706" stroke-width="1.5"/>
  <!-- Arms suggestion -->
  <line x1="403" y1="154" x2="390" y2="164" stroke="#d97706" stroke-width="2" stroke-linecap="round"/>
  <line x1="427" y1="154" x2="440" y2="164" stroke="#d97706" stroke-width="2" stroke-linecap="round"/>
  <text x="415" y="200" text-anchor="middle" font-size="10" fill="#14532d">Baby's shoulders just below</text>
  <text x="415" y="213" text-anchor="middle" font-size="10" fill="#14532d">the folded edge. Arms straight.</text>

  <!-- Step 3 -->
  <rect x="30" y="218" width="230" height="120" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="145" y="238" text-anchor="middle" font-size="12" font-weight="bold" fill="#14532d">Step 3 — Wrap left side</text>
  <!-- Baby with left wrap arrow -->
  <ellipse cx="145" cy="268" rx="20" ry="16" fill="#fde68a" stroke="#d97706" stroke-width="1.5"/>
  <rect x="134" y="282" width="22" height="36" rx="7" fill="#fde68a" stroke="#d97706" stroke-width="1.5"/>
  <!-- Left wrap -->
  <path d="M110,276 Q108,272 134,282 Q120,284 115,294 Q108,306 112,316" fill="none" stroke="#22c55e" stroke-width="3" stroke-dasharray="5,3"/>
  <polygon points="112,316 108,310 117,311" fill="#22c55e"/>
  <text x="145" y="320" text-anchor="middle" font-size="10" fill="#14532d">Left arm straight down. Pull</text>
  <text x="145" y="333" text-anchor="middle" font-size="10" fill="#14532d">left flap across &amp; tuck under.</text>

  <!-- Step 4 -->
  <rect x="300" y="218" width="230" height="120" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="415" y="238" text-anchor="middle" font-size="12" font-weight="bold" fill="#14532d">Step 4 — Wrap right side</text>
  <!-- Baby fully wrapped -->
  <ellipse cx="415" cy="268" rx="20" ry="16" fill="#fde68a" stroke="#d97706" stroke-width="1.5"/>
  <rect x="400" y="282" width="30" height="40" rx="10" fill="#86efac" stroke="#22c55e" stroke-width="2"/>
  <!-- Hip room indicator -->
  <ellipse cx="415" cy="318" rx="14" ry="6" fill="none" stroke="#d97706" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="415" y="308" text-anchor="middle" font-size="9" fill="#14532d">↕ hips have room</text>
  <text x="415" y="330" text-anchor="middle" font-size="10" fill="#14532d">Right arm down. Pull right flap</text>
  <text x="415" y="343" text-anchor="middle" font-size="10" fill="#14532d">across &amp; tuck snugly. Done!</text>

  <!-- Safety note bottom -->
  <rect x="30" y="344" width="500" height="12" rx="4" fill="#fde8d5"/>
  <text x="280" y="354" text-anchor="middle" font-size="9.5" fill="#7c2d12">⚠ Safety: Always place swaddled baby on their back. Stop swaddling once baby can roll (usually 2–3 months).</text>

  <!-- Analogy -->
  <!-- Already covered in safety note area -->
</svg>
