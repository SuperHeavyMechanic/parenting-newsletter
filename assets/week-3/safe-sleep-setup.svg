<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 390" font-family="Arial,sans-serif">

  <!-- Background -->
  <rect width="580" height="390" fill="#FFFFFF" rx="12"/>

  <!-- Title -->
  <text x="290" y="34" text-anchor="middle" font-size="19" font-weight="bold" fill="#1A1A2E">Safe Sleep Setup — The ABC Rule</text>
  <text x="290" y="53" text-anchor="middle" font-size="12" fill="#666">Alone · on their Back · in a Crib (or firm flat surface)</text>

  <!-- ===== SAFE SLEEP (left panel — green) ===== -->
  <text x="155" y="78" text-anchor="middle" font-size="14" font-weight="bold" fill="#2E7D32">✓  Safe</text>

  <!-- Crib/bassinet outline -->
  <rect x="50" y="95" width="210" height="160" rx="10" fill="#F5F5F5" stroke="#7BC67B" stroke-width="3"/>
  <!-- Crib legs -->
  <rect x="65" y="255" width="12" height="28" rx="3" fill="#A0A0A0"/>
  <rect x="243" y="255" width="12" height="28" rx="3" fill="#A0A0A0"/>
  <!-- Crib bars (vertical) -->
  <line x1="82" y1="95" x2="82" y2="255" stroke="#B0C4D8" stroke-width="2"/>
  <line x1="108" y1="95" x2="108" y2="255" stroke="#B0C4D8" stroke-width="2"/>
  <line x1="134" y1="95" x2="134" y2="255" stroke="#B0C4D8" stroke-width="2"/>
  <line x1="160" y1="95" x2="160" y2="255" stroke="#B0C4D8" stroke-width="2"/>
  <line x1="186" y1="95" x2="186" y2="255" stroke="#B0C4D8" stroke-width="2"/>
  <line x1="212" y1="95" x2="212" y2="255" stroke="#B0C4D8" stroke-width="2"/>
  <line x1="238" y1="95" x2="238" y2="255" stroke="#B0C4D8" stroke-width="2"/>
  <!-- Mattress -->
  <rect x="60" y="210" width="190" height="38" rx="5" fill="#D6EAD6" stroke="#7BC67B" stroke-width="1.5"/>

  <!-- Baby lying on BACK (top-down view) -->
  <!-- Body oval -->
  <ellipse cx="155" cy="200" rx="42" ry="26" fill="#FFD8B5" stroke="#DFA880" stroke-width="2"/>
  <!-- Head circle -->
  <circle cx="155" cy="165" r="24" fill="#FFD8B5" stroke="#DFA880" stroke-width="2"/>
  <!-- Eyes (closed, sleeping) -->
  <path d="M143,163 Q147,160 151,163" stroke="#888" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M159,163 Q163,160 167,163" stroke="#888" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Small smile -->
  <path d="M149,172 Q155,176 161,172" stroke="#C08070" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Arms (by sides) -->
  <ellipse cx="108" cy="198" rx="9" ry="18" fill="#FFD8B5" stroke="#DFA880" stroke-width="1.5" transform="rotate(-10,108,198)"/>
  <ellipse cx="202" cy="198" rx="9" ry="18" fill="#FFD8B5" stroke="#DFA880" stroke-width="1.5" transform="rotate(10,202,198)"/>
  <!-- Legs -->
  <ellipse cx="138" cy="228" rx="12" ry="9" fill="#FFD8B5" stroke="#DFA880" stroke-width="1.5"/>
  <ellipse cx="172" cy="228" rx="12" ry="9" fill="#FFD8B5" stroke="#DFA880" stroke-width="1.5"/>

  <!-- ABC Labels under safe crib -->
  <text x="65" y="300" font-size="13" fill="#2E7D32" font-weight="bold">A</text>
  <text x="78" y="300" font-size="12" fill="#333">  Alone — no co-sleeping</text>
  <text x="65" y="318" font-size="13" fill="#2E7D32" font-weight="bold">B</text>
  <text x="78" y="318" font-size="12" fill="#333">  Back — always on their back</text>
  <text x="65" y="336" font-size="13" fill="#2E7D32" font-weight="bold">C</text>
  <text x="78" y="336" font-size="12" fill="#333">  Crib — firm, flat surface</text>

  <!-- ===== NOT SAFE (right panel — red X items) ===== -->
  <text x="425" y="78" text-anchor="middle" font-size="14" font-weight="bold" fill="#C62828">✗  Not in the sleep space</text>

  <!-- Item 1: Pillow -->
  <rect x="310" y="100" width="230" height="42" rx="6" fill="#FFEBEE" stroke="#E57373" stroke-width="1.5"/>
  <text x="330" y="126" font-size="28" fill="#E57373">✗</text>
  <text x="365" y="116" font-size="13" fill="#333" font-weight="bold">Pillow or cushion</text>
  <text x="365" y="132" font-size="11" fill="#666">suffocation risk</text>

  <!-- Item 2: Loose blanket -->
  <rect x="310" y="152" width="230" height="42" rx="6" fill="#FFEBEE" stroke="#E57373" stroke-width="1.5"/>
  <text x="330" y="178" font-size="28" fill="#E57373">✗</text>
  <text x="365" y="168" font-size="13" fill="#333" font-weight="bold">Loose blanket</text>
  <text x="365" y="184" font-size="11" fill="#666">suffocation / overheating risk</text>

  <!-- Item 3: Stuffed toy -->
  <rect x="310" y="204" width="230" height="42" rx="6" fill="#FFEBEE" stroke="#E57373" stroke-width="1.5"/>
  <text x="330" y="230" font-size="28" fill="#E57373">✗</text>
  <text x="365" y="220" font-size="13" fill="#333" font-weight="bold">Stuffed toy</text>
  <text x="365" y="236" font-size="11" fill="#666">suffocation risk</text>

  <!-- Item 4: Crib bumper -->
  <rect x="310" y="256" width="230" height="42" rx="6" fill="#FFEBEE" stroke="#E57373" stroke-width="1.5"/>
  <text x="330" y="282" font-size="28" fill="#E57373">✗</text>
  <text x="365" y="272" font-size="13" fill="#333" font-weight="bold">Crib bumpers</text>
  <text x="365" y="288" font-size="11" fill="#666">entrapment risk</text>

  <!-- Item 5: Sleep positioner -->
  <rect x="310" y="308" width="230" height="42" rx="6" fill="#FFEBEE" stroke="#E57373" stroke-width="1.5"/>
  <text x="330" y="334" font-size="28" fill="#E57373">✗</text>
  <text x="365" y="324" font-size="13" fill="#333" font-weight="bold">Sleep positioners / wedges</text>
  <text x="365" y="340" font-size="11" fill="#666">not safety-approved</text>

  <!-- Divider -->
  <line x1="300" y1="70" x2="300" y2="360" stroke="#E0E0E0" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Analogy -->
  <rect x="20" y="358" width="540" height="25" rx="6" fill="#EEF4FB" stroke="#B8D4F0" stroke-width="1"/>
  <text x="290" y="374" text-anchor="middle" font-size="11" fill="#333">💡 Like a minimalist hotel room — just a firm mattress. Nothing extra needed for a newborn to sleep safely.</text>

  <!-- Source note -->
  <text x="290" y="387" text-anchor="middle" font-size="9" fill="#999">Source: CDC Safe Sleep · cdc.gov/sudden-infant-death/sleep-safely</text>
</svg>
