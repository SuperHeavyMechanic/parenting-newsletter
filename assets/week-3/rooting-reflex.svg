<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" font-family="Arial,sans-serif">
  <defs>
    <marker id="arr2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2D6A9F"/>
    </marker>
    <marker id="arrO" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F5A623"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="560" height="360" fill="#FFFFFF" rx="12"/>

  <!-- Title -->
  <text x="280" y="34" text-anchor="middle" font-size="19" font-weight="bold" fill="#1A1A2E">The Rooting Reflex</text>
  <text x="280" y="53" text-anchor="middle" font-size="12" fill="#666">Touch baby's cheek → baby turns toward it + opens mouth</text>

  <!-- ===== BEFORE (left panel) ===== -->
  <text x="145" y="80" text-anchor="middle" font-size="13" font-weight="bold" fill="#555">① Touch cheek</text>

  <!-- Baby head (circle, facing right) -->
  <circle cx="145" cy="170" r="65" fill="#FFD8B5" stroke="#DFA880" stroke-width="2"/>
  <!-- Ear -->
  <ellipse cx="82" cy="170" rx="10" ry="15" fill="#F0C8A0" stroke="#DFA880" stroke-width="1.5"/>
  <!-- Eye -->
  <ellipse cx="165" cy="152" rx="8" ry="6" fill="#FFFFFF" stroke="#888" stroke-width="1.5"/>
  <circle cx="167" cy="153" r="4" fill="#4A3020"/>
  <!-- Nose -->
  <ellipse cx="180" cy="172" rx="5" ry="4" fill="#F0B090"/>
  <!-- Closed mouth (relaxed) -->
  <path d="M168,188 Q182,192 196,188" stroke="#C08070" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Finger touching cheek (from right) -->
  <rect x="210" y="160" width="50" height="18" rx="9" fill="#FFD0A0" stroke="#D4A060" stroke-width="1.5"/>
  <!-- Fingernail hint -->
  <ellipse cx="256" cy="169" rx="7" ry="5" fill="#F5EAD8" stroke="#D4A060" stroke-width="1"/>
  <!-- Label: finger -->
  <text x="268" y="165" font-size="12" fill="#2D6A9F">←  your</text>
  <text x="268" y="179" font-size="12" fill="#2D6A9F">   finger</text>

  <!-- Touch point star/dot -->
  <circle cx="208" cy="169" r="6" fill="#F5A623" stroke="#C07A00" stroke-width="1.5"/>

  <!-- ===== ARROW between panels ===== -->
  <line x1="236" y1="200" x2="310" y2="200" stroke="#F5A623" stroke-width="3" marker-end="url(#arrO)"/>
  <text x="272" y="195" text-anchor="middle" font-size="12" fill="#C07A00" font-weight="bold">reflex</text>

  <!-- ===== AFTER (right panel) ===== -->
  <text x="415" y="80" text-anchor="middle" font-size="13" font-weight="bold" fill="#555">② Turns + opens mouth</text>

  <!-- Baby head (turned toward touch — rotated slightly) -->
  <circle cx="415" cy="170" r="65" fill="#FFD8B5" stroke="#DFA880" stroke-width="2"/>
  <!-- Ear (now less visible, on far side) -->
  <ellipse cx="353" cy="170" rx="8" ry="13" fill="#F0C8A0" stroke="#DFA880" stroke-width="1.5"/>
  <!-- Eye (facing more forward now) -->
  <ellipse cx="432" cy="152" rx="8" ry="6" fill="#FFFFFF" stroke="#888" stroke-width="1.5"/>
  <circle cx="434" cy="153" r="4" fill="#4A3020"/>
  <!-- Nose (moved toward touch side) -->
  <ellipse cx="447" cy="172" rx="5" ry="4" fill="#F0B090"/>
  <!-- Open mouth (rooting — searching for nipple) -->
  <path d="M432,185 Q448,200 464,185" stroke="#C08070" stroke-width="2" fill="#FFCCC0" stroke-linecap="round"/>
  <ellipse cx="448" cy="193" rx="12" ry="7" fill="#FFCCC0" stroke="#C08070" stroke-width="1"/>

  <!-- Arrow showing head turning right (toward the touch) -->
  <path d="M415,110 Q455,90 475,115" stroke="#2D6A9F" stroke-width="2.5" fill="none" marker-end="url(#arr2)" stroke-dasharray="5,3"/>
  <text x="445" y="100" font-size="11" fill="#2D6A9F" font-weight="bold">turns!</text>

  <!-- Divider line -->
  <line x1="280" y1="70" x2="280" y2="290" stroke="#E0E0E0" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- What this means box -->
  <rect x="20" y="270" width="520" height="44" rx="8" fill="#E8F4E8" stroke="#7BC67B" stroke-width="1.5"/>
  <text x="280" y="287" text-anchor="middle" font-size="12" fill="#2E7D32" font-weight="bold">What this means for feeding:</text>
  <text x="280" y="305" text-anchor="middle" font-size="11" fill="#333">Stroke the cheek nearest the breast or bottle — baby turns toward it and opens up. This is how</text>

  <!-- Analogy strip -->
  <rect x="20" y="322" width="520" height="26" rx="7" fill="#EEF4FB" stroke="#B8D4F0" stroke-width="1"/>
  <text x="280" y="339" text-anchor="middle" font-size="11" fill="#333">💡 Like a compass needle pointing to a magnet — touch = magnet, baby's mouth = needle.</text>
</svg>
