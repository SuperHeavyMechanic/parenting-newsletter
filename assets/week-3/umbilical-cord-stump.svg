<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 300" width="440" height="300" font-family="Georgia, serif">
  <!-- Background -->
  <rect width="440" height="300" fill="#f5f9f2" rx="12"/>

  <!-- Title -->
  <text x="220" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c2c2c">Umbilical Cord Stump Care</text>
  <text x="220" y="46" text-anchor="middle" font-size="11" fill="#666">Keep it dry · Let air reach it · Fold nappy below it</text>

  <!-- Baby torso (simple oval) -->
  <ellipse cx="220" cy="165" rx="90" ry="95" fill="#f9d9c0" stroke="#c4a882" stroke-width="2"/>

  <!-- Belly button / stump area -->
  <!-- Base ring -->
  <ellipse cx="220" cy="148" rx="14" ry="8" fill="#d4a880" stroke="#b08060" stroke-width="1.5"/>
  <!-- Stump cord - brownish-yellowish dried -->
  <path d="M220 148 Q215 135 218 120 Q220 110 222 105" stroke="#8B6914" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M220 148 Q225 135 222 120 Q220 110 222 105" stroke="#a07820" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.5"/>
  <!-- Stump tip (clip residual) -->
  <ellipse cx="222" cy="103" rx="7" ry="5" fill="#8B6914" stroke="#5a4010" stroke-width="1.2"/>
  <!-- Stump label -->
  <line x1="232" y1="120" x2="310" y2="108" stroke="#8B6914" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="315" y="108" font-size="11" fill="#8B6914" font-weight="bold">cord stump</text>
  <text x="315" y="120" font-size="9" fill="#8B6914">(dries, darkens,</text>
  <text x="315" y="132" font-size="9" fill="#8B6914">falls off ~2 weeks)</text>

  <!-- Air zone arrows -->
  <text x="220" y="88" text-anchor="middle" font-size="11" fill="#3498db" font-weight="bold">AIR</text>
  <line x1="210" y1="91" x2="216" y2="100" stroke="#3498db" stroke-width="1.5" marker-end="url(#blueArr)"/>
  <line x1="230" y1="91" x2="224" y2="100" stroke="#3498db" stroke-width="1.5" marker-end="url(#blueArr)"/>
  <defs>
    <marker id="blueArr" markerWidth="5" markerHeight="5" refX="2.5" refY="2.5" orient="auto">
      <path d="M0,0 L5,2.5 L0,5 Z" fill="#3498db"/>
    </marker>
    <marker id="redArr" markerWidth="5" markerHeight="5" refX="2.5" refY="2.5" orient="auto">
      <path d="M0,0 L5,2.5 L0,5 Z" fill="#e74c3c"/>
    </marker>
  </defs>

  <!-- Nappy / diaper folded below stump -->
  <!-- Nappy body -->
  <path d="M130 215 Q140 240 175 248 Q220 255 265 248 Q300 240 310 215 Z" fill="#dce8f8" stroke="#7aadd4" stroke-width="2"/>
  <!-- Nappy top fold (folded down) -->
  <path d="M130 215 Q140 205 175 200 Q220 195 265 200 Q300 205 310 215" fill="#b8d4f0" stroke="#7aadd4" stroke-width="1.5"/>
  <!-- Fold arrow label -->
  <line x1="225" y1="196" x2="225" y2="178" stroke="#2471a3" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#blueArr)"/>
  <text x="232" y="188" font-size="9" fill="#2471a3">fold</text>
  <text x="232" y="198" font-size="9" fill="#2471a3">down</text>

  <!-- Gap between nappy top and stump -->
  <line x1="190" y1="196" x2="190" y2="155" stroke="#27ae60" stroke-width="1" stroke-dasharray="2,3"/>
  <line x1="250" y1="196" x2="250" y2="155" stroke="#27ae60" stroke-width="1" stroke-dasharray="2,3"/>
  <rect x="175" y="168" width="90" height="26" fill="#e8f8e8" rx="4" stroke="#27ae60" stroke-width="1.2"/>
  <text x="220" y="183" text-anchor="middle" font-size="10" fill="#27ae60" font-weight="bold">DRY ZONE</text>
  <text x="220" y="193" text-anchor="middle" font-size="8" fill="#27ae60">keep this gap open</text>

  <!-- DO NOT label with X over water drop -->
  <text x="88" y="205" text-anchor="middle" font-size="9" fill="#e74c3c" font-weight="bold">DON'T</text>
  <!-- water drop shape -->
  <path d="M75 208 Q72 218 75 225 Q82 232 88 225 Q92 218 88 208 Q82 200 75 208 Z" fill="#aed6f1" stroke="#e74c3c" stroke-width="2"/>
  <line x1="72" y1="205" x2="104" y2="234" stroke="#e74c3c" stroke-width="2.5"/>
  <text x="88" y="243" text-anchor="middle" font-size="9" fill="#e74c3c">wet it</text>

  <!-- DO NOT alcohol -->
  <text x="352" y="205" text-anchor="middle" font-size="9" fill="#e74c3c" font-weight="bold">DON'T</text>
  <rect x="332" y="210" width="40" height="20" fill="#f9e4b7" rx="3" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="352" y="223" text-anchor="middle" font-size="9" fill="#8B4513">alcohol</text>
  <line x1="330" y1="208" x2="374" y2="232" stroke="#e74c3c" stroke-width="2.5"/>
  <text x="352" y="243" text-anchor="middle" font-size="9" fill="#e74c3c">use alcohol</text>

  <!-- Bottom note -->
  <text x="220" y="268" text-anchor="middle" font-size="10" fill="#555" font-style="italic">Like a scab — leave it alone; let it dry and fall off on its own (~2 weeks).</text>
  <text x="220" y="283" text-anchor="middle" font-size="9" fill="#888">Mayo Clinic: mayoclinic.org/healthy-lifestyle/infant-and-toddler-health/in-depth/umbilical-cord/art-20048250</text>
</svg>
