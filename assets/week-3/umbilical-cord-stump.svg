<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 370" font-family="Arial,sans-serif">
  <defs>
    <marker id="arr1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2D6A9F"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="580" height="370" fill="#FFFFFF" rx="12"/>

  <!-- Title -->
  <text x="290" y="34" text-anchor="middle" font-size="19" font-weight="bold" fill="#1A1A2E">Umbilical Cord Stump</text>
  <text x="290" y="53" text-anchor="middle" font-size="12" fill="#666">Keep it dry · fold the diaper below it · leave it alone</text>

  <!-- Belly (oval) -->
  <ellipse cx="185" cy="185" rx="85" ry="105" fill="#FFD8B5" stroke="#DFA880" stroke-width="2"/>

  <!-- Belly button -->
  <ellipse cx="185" cy="170" rx="10" ry="8" fill="#F0B990" stroke="#DFA880" stroke-width="1.5"/>

  <!-- Cord stump (dried brownish stub above belly button) -->
  <rect x="180" y="142" width="10" height="28" rx="4" fill="#7B4E2D" stroke="#5A3520" stroke-width="1.5"/>
  <!-- Plastic clamp at base -->
  <rect x="178" y="166" width="14" height="5" rx="2" fill="#C8A010" stroke="#A07810" stroke-width="1"/>

  <!-- Air gap (orange dashed line between stump and diaper) -->
  <line x1="185" y1="170" x2="185" y2="205" stroke="#F5A623" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="193" y="192" font-size="11" fill="#C07A00" font-weight="bold">air gap</text>

  <!-- Diaper (rectangle below belly) -->
  <rect x="112" y="210" width="146" height="72" rx="6" fill="#AED4F0" stroke="#7AAFD4" stroke-width="2"/>
  <!-- Diaper top waistband (bold line) -->
  <line x1="112" y1="210" x2="258" y2="210" stroke="#5490C8" stroke-width="3.5"/>

  <!-- Label: Cord stump (right side) -->
  <line x1="193" y1="156" x2="295" y2="130" stroke="#2D6A9F" stroke-width="1.5" marker-end="url(#arr1)"/>
  <text x="298" y="125" font-size="13" fill="#2D6A9F" font-weight="bold">Cord stump</text>
  <text x="298" y="141" font-size="11" fill="#555">Dries out → darkens → falls off</text>
  <text x="298" y="155" font-size="11" fill="#555">on its own in 1–3 weeks</text>

  <!-- Label: Diaper (right side) -->
  <line x1="258" y1="244" x2="295" y2="244" stroke="#2D6A9F" stroke-width="1.5" marker-end="url(#arr1)"/>
  <text x="298" y="239" font-size="13" fill="#2D6A9F" font-weight="bold">Diaper waistband</text>
  <text x="298" y="255" font-size="11" fill="#555">folded DOWN below the stump</text>
  <text x="298" y="269" font-size="11" fill="#555">so it gets air + stays dry</text>

  <!-- Do NOT box -->
  <rect x="295" y="285" width="258" height="65" rx="8" fill="#FFF3E0" stroke="#F5A623" stroke-width="1.5"/>
  <text x="424" y="302" text-anchor="middle" font-size="12" font-weight="bold" fill="#D84315">⚠  Do NOT</text>
  <text x="305" y="319" font-size="11" fill="#444">• Pull, twist, or try to remove the stump</text>
  <text x="305" y="335" font-size="11" fill="#444">• Submerge in water — use sponge baths only</text>

  <!-- Analogy strip -->
  <rect x="20" y="322" width="268" height="36" rx="7" fill="#EEF4FB" stroke="#B8D4F0" stroke-width="1"/>
  <text x="154" y="337" text-anchor="middle" font-size="11" fill="#333">💡 Like a scab on a scraped knee —</text>
  <text x="154" y="351" text-anchor="middle" font-size="11" fill="#333">leave it alone and it heals itself.</text>

  <!-- Source note -->
  <text x="290" y="365" text-anchor="middle" font-size="9" fill="#999">Source: Mayo Clinic · mayoclinic.org/umbilical-cord/art-20048250</text>
</svg>
